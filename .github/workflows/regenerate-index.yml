name: regenerate-index

on:
  repository_dispatch:
    types: [contract-released]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

concurrency:
  group: regenerate-index
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Regenerate simple-index
        env:
          GITHUB_TOKEN: ${{ secrets.BRINK_RELEASE_READ_TOKEN }}
        run: python scripts/generate_simple_index.py

      - name: Commit + push if changed
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
        run: |
          git config user.name 'contract-index-bot'
          git config user.email 'contract-index-bot@users.noreply.github.com'
          git add pages/
          if git diff --staged --quiet; then
            echo 'No index changes; nothing to commit.'
            exit 0
          fi
          if [ -n "$DISPATCH_TAG" ]; then
            MSG="regenerate index for $DISPATCH_TAG"
          else
            MSG="regenerate index (scheduled/manual)"
          fi
          git commit -m "$MSG"
          git push origin HEAD:main
